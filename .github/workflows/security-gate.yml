# gate-template-version: 2
# Generated by the security-gate skill (Tier 1). Adapted for npm (zero runtime deps).
# Actions are tag-pinned here; Dependabot (github-actions) promotes them to commit SHAs.
name: security-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      # ===== TIER0: frozen install (lockfile hash verification) =====
      - name: Frozen install
        run: npm ci
      # ===== /TIER0 =====

      # ===== TIER1: dependency vuln scan =====
      # Secret scanning is delegated to GitHub's native push protection (default-on
      # for public repos); SBOM comes from GitHub's dependency graph. No in-CI
      # gitleaks/anchore steps. This package ships zero runtime deps, so the audit
      # is a no-op today but guards future dependency additions.
      - name: Vulnerability scan
        run: npm audit --omit=dev --audit-level=high
      # ===== /TIER1 =====
