name: Upstream compatibility snapshot

"on":
  schedule:
    # Fridays at 03:17 UTC — aligned with US Thu evening PT deploy.
    - cron: "17 3 * * 5"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: upstream-compat
  cancel-in-progress: false

jobs:
  snapshot:
    name: Refresh upstream snapshots and report drift
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh snapshots
        run: node scripts/snapshot-upstream.mjs

      - name: Detect drift
        id: drift
        run: |
          set -euo pipefail
          # Stage intent so newly-added snapshot files show up in `git diff`.
          git add --intent-to-add -- snapshots >/dev/null 2>&1 || true
          if git diff --quiet -- snapshots; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no upstream drift"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            mkdir -p .upstream-compat
            {
              echo "## Changed files"
              echo
              git diff --name-only -- snapshots | sed 's/^/- /'
              echo
              echo "## Diff"
              echo
              echo '```diff'
              git diff -- snapshots
              echo '```'
            } > .upstream-compat/diff.md
            # Truncate to ~60KB if huge.
            max_bytes=61440
            actual_bytes=$(wc -c < .upstream-compat/diff.md)
            if [ "$actual_bytes" -gt "$max_bytes" ]; then
              head -c "$max_bytes" .upstream-compat/diff.md > .upstream-compat/diff.truncated.md
              {
                cat .upstream-compat/diff.truncated.md
                echo
                echo "_…diff truncated (${actual_bytes} bytes total, showing first ${max_bytes})._"
              } > .upstream-compat/diff.md
              rm .upstream-compat/diff.truncated.md
            fi
          fi

      - name: Build issue body
        if: steps.drift.outputs.changed == 'true'
        id: body
        run: |
          set -euo pipefail
          today=$(date -u +%F)
          echo "title=Upstream CLI compatibility drift detected (${today})" >> "$GITHUB_OUTPUT"
          {
            echo "Automated upstream snapshot diff detected drift on ${today} (UTC)."
            echo
            echo "Source: \`scripts/snapshot-upstream.mjs\` run via \`.github/workflows/upstream-compat.yml\`."
            echo
            cat .upstream-compat/diff.md
            echo
            echo "## Manual review checklist"
            echo
            echo "Layer 4 (manual review) — judgements that cannot be automated. Review each:"
            echo
            l4_drift=$(git diff -- snapshots/claude/changelog.md snapshots/codex/changelog.md snapshots/claude/releases.json snapshots/codex/releases.json 2>/dev/null | grep -E '^\+' | grep -vE '^\+\+\+' || true)
            mark_l4() {
              local hits
              hits=$(printf '%s\n' "$l4_drift" | grep -ioE "$1" 2>/dev/null | sort -u | head -4 | tr '\n' ',' | sed 's/,$//' || true)
              [ -n "${hits:-}" ] && printf ' _(triggered: %s)_' "$hits"
            }
            printf -- "- [ ] Deprecated alias runtime acceptance — schema removal does not always mean runtime removal.%s\n" "$(mark_l4 'deprecat[a-z]*|removed |legacy|alias')"
            printf -- "- [ ] Permission / sandbox security equivalence — confirm new modes still map safely (e.g. \`workspace-write\` ↔ \`Write/Edit/MultiEdit\`).%s\n" "$(mark_l4 'sandbox|workspace-write|read-only|dangerously-skip-permissions|permission-mode')"
            printf -- "- [ ] Permission key rename semantics — verify \`permissions.allow\` → \`permissions.allowList\` style renames are pure renames.%s\n" "$(mark_l4 'permissions\.allow|allowList|renamed|key rename')"
            printf -- "- [ ] New host-vendor intent — read changelog prose for direction shifts.%s\n" "$(mark_l4 'now uses|now defaults|replaces|migration|sunset|breaking')"
            printf -- "- [ ] Runtime engine impact — \`bin/ai-config-sync.mjs\` hard-codes upstream schema keys (e.g. \`approval_policy\`, \`sandbox_mode\`, \`prefix_rule\`, \`PreToolUse\`). New keys or renamed modes may require runtime changes.%s\n" "$(mark_l4 'approval_policy|sandbox_mode|prefix_rule|PreToolUse|PostToolUse|UserPromptSubmit|SessionStart|model_reasoning_effort|hooks\.')"
            printf -- "- [ ] Integration plugin impact — \`integrations/claude-plugin\` and \`integrations/codex-plugin\` may need metadata updates when host config layout shifts.%s\n" "$(mark_l4 'plugin\.json|marketplace|SKILL\.md|skills/|plugin-dir|plugin cache')"
            printf -- "- [ ] Test fixture impact — \`tests/integration/**/config.toml\` and JSON fixtures encode current schema shapes; new formats need golden/fixture refresh.%s\n" "$(mark_l4 'new field|new key|schema|format change|breaking|json output')"
            echo
            echo "If rule files (\`rules/terminology-map.json\`, \`rules/agents-map.json\`, \`rules/call-templates.json\`, \`rules/host-target-templates.json\`) need updates, follow the priority order in Layer 2 of the plan. Also review \`bin/ai-config-sync.mjs\` runtime, \`integrations/\` plugin metadata, and \`tests/integration/\` fixtures for downstream impact."
          } > .upstream-compat/body.md
          # Compat scan: top-level schema keys ADDED in this drift that no rules/ or bin/ code references.
          ALLOWLIST=rules/upstream-known-unsupported.json
          extract_keys() {
            local f="$1"
            if [ -f "$f" ]; then
              jq -r '.properties // {} | keys[]' "$f" 2>/dev/null | sort -u
            fi
          }
          extract_keys_head() {
            local path="$1"
            git show "HEAD:$path" 2>/dev/null | jq -r '.properties // {} | keys[]' 2>/dev/null | sort -u || true
          }
          # Nested keys: definitions.<TypeName>.properties.<field> — covers RawMcpServerConfig and other $ref targets.
          extract_nested() {
            local f="$1"
            if [ -f "$f" ]; then
              jq -r '.definitions // {} | to_entries[] | . as $d | ($d.value.properties // {}) | keys[] | "\($d.key).\(.)"' "$f" 2>/dev/null | sort -u
            fi
          }
          extract_nested_head() {
            local path="$1"
            git show "HEAD:$path" 2>/dev/null | jq -r '.definitions // {} | to_entries[] | . as $d | ($d.value.properties // {}) | keys[] | "\($d.key).\(.)"' 2>/dev/null | sort -u || true
          }
          claude_added=$(comm -23 <(extract_keys snapshots/claude/settings-schema.json) <(extract_keys_head snapshots/claude/settings-schema.json) || true)
          codex_added=$(comm -23 <(extract_keys snapshots/codex/config-schema.json) <(extract_keys_head snapshots/codex/config-schema.json) || true)
          claude_nested_added=$(comm -23 <(extract_nested snapshots/claude/settings-schema.json) <(extract_nested_head snapshots/claude/settings-schema.json) || true)
          codex_nested_added=$(comm -23 <(extract_nested snapshots/codex/config-schema.json) <(extract_nested_head snapshots/codex/config-schema.json) || true)
          check_coverage() {
            local key="$1"
            grep -q "\"$key\"\|'$key'" rules/*.json bin/ai-config-sync.mjs 2>/dev/null
          }
          # Allowlist gate: keys with an entry in rules/upstream-known-unsupported.json are intentional decisions, not gaps.
          is_allowlisted() {
            [ -f "$ALLOWLIST" ] || return 1
            jq -e --arg k "$3" ".${1}_${2} // {} | has(\$k)" "$ALLOWLIST" >/dev/null 2>&1
          }
          claude_missing=""
          if [ -n "${claude_added:-}" ]; then
            while IFS= read -r key; do
              [ -z "${key:-}" ] && continue
              if ! check_coverage "$key" && ! is_allowlisted claude top_level "$key"; then
                claude_missing="${claude_missing}- settings.${key}"$'\n'
              fi
            done <<< "$claude_added"
          fi
          codex_missing=""
          if [ -n "${codex_added:-}" ]; then
            while IFS= read -r key; do
              [ -z "${key:-}" ] && continue
              if ! check_coverage "$key" && ! is_allowlisted codex top_level "$key"; then
                codex_missing="${codex_missing}- config.${key}"$'\n'
              fi
            done <<< "$codex_added"
          fi
          claude_nested_missing=""
          if [ -n "${claude_nested_added:-}" ]; then
            while IFS= read -r path; do
              [ -z "${path:-}" ] && continue
              leaf="${path##*.}"
              if ! check_coverage "$leaf" && ! is_allowlisted claude nested "$path"; then
                claude_nested_missing="${claude_nested_missing}- settings.${path}"$'\n'
              fi
            done <<< "$claude_nested_added"
          fi
          codex_nested_missing=""
          if [ -n "${codex_nested_added:-}" ]; then
            while IFS= read -r path; do
              [ -z "${path:-}" ] && continue
              leaf="${path##*.}"
              if ! check_coverage "$leaf" && ! is_allowlisted codex nested "$path"; then
                codex_nested_missing="${codex_nested_missing}- config.${path}"$'\n'
              fi
            done <<< "$codex_nested_added"
          fi
          if [ -n "${claude_missing:-}" ] || [ -n "${codex_missing:-}" ]; then
            {
              echo
              echo "## Compat scan — new uncovered upstream keys"
              echo
              echo "Top-level schema keys **added in this drift** that are not referenced in \`rules/*.json\` or \`bin/ai-config-sync.mjs\`, and not present in \`rules/upstream-known-unsupported.json\`. Likely new upstream features that may need explicit mapping; intentional unsupported keys belong in the allowlist."
              if [ -n "${claude_missing:-}" ]; then
                echo
                echo "### Claude"
                printf '%s' "$claude_missing"
              fi
              if [ -n "${codex_missing:-}" ]; then
                echo
                echo "### Codex"
                printf '%s' "$codex_missing"
              fi
            } >> .upstream-compat/body.md
          fi
          if [ -n "${claude_nested_missing:-}" ] || [ -n "${codex_nested_missing:-}" ]; then
            {
              echo
              echo "## Compat scan — new uncovered upstream keys (nested)"
              echo
              echo "Schema \`definitions.<Type>.properties.<field>\` paths added in this drift, not referenced in code and not allowlisted. Catches changes to \`RawMcpServerConfig\`, hook payload shapes, and similar \$ref-targets that the top-level scan misses."
              if [ -n "${claude_nested_missing:-}" ]; then
                echo
                echo "### Claude"
                printf '%s' "$claude_nested_missing"
              fi
              if [ -n "${codex_nested_missing:-}" ]; then
                echo
                echo "### Codex"
                printf '%s' "$codex_nested_missing"
              fi
            } >> .upstream-compat/body.md
          fi
          # ADDED-only scan misses upstream renames/removals — if a removed key is still referenced, flag it.
          claude_removed=$(comm -13 <(extract_keys snapshots/claude/settings-schema.json) <(extract_keys_head snapshots/claude/settings-schema.json) || true)
          codex_removed=$(comm -13 <(extract_keys snapshots/codex/config-schema.json) <(extract_keys_head snapshots/codex/config-schema.json) || true)
          claude_nested_removed=$(comm -13 <(extract_nested snapshots/claude/settings-schema.json) <(extract_nested_head snapshots/claude/settings-schema.json) || true)
          codex_nested_removed=$(comm -13 <(extract_nested snapshots/codex/config-schema.json) <(extract_nested_head snapshots/codex/config-schema.json) || true)
          claude_stale=""
          if [ -n "${claude_removed:-}" ]; then
            while IFS= read -r key; do
              [ -z "${key:-}" ] && continue
              if check_coverage "$key"; then
                claude_stale="${claude_stale}- settings.${key}"$'\n'
              fi
            done <<< "$claude_removed"
          fi
          codex_stale=""
          if [ -n "${codex_removed:-}" ]; then
            while IFS= read -r key; do
              [ -z "${key:-}" ] && continue
              if check_coverage "$key"; then
                codex_stale="${codex_stale}- config.${key}"$'\n'
              fi
            done <<< "$codex_removed"
          fi
          claude_nested_stale=""
          if [ -n "${claude_nested_removed:-}" ]; then
            while IFS= read -r path; do
              [ -z "${path:-}" ] && continue
              leaf="${path##*.}"
              if check_coverage "$leaf"; then
                claude_nested_stale="${claude_nested_stale}- settings.${path}"$'\n'
              fi
            done <<< "$claude_nested_removed"
          fi
          codex_nested_stale=""
          if [ -n "${codex_nested_removed:-}" ]; then
            while IFS= read -r path; do
              [ -z "${path:-}" ] && continue
              leaf="${path##*.}"
              if check_coverage "$leaf"; then
                codex_nested_stale="${codex_nested_stale}- config.${path}"$'\n'
              fi
            done <<< "$codex_nested_removed"
          fi
          if [ -n "${claude_stale:-}" ] || [ -n "${codex_stale:-}" ] || [ -n "${claude_nested_stale:-}" ] || [ -n "${codex_nested_stale:-}" ]; then
            {
              echo
              echo "## Compat scan — removed upstream keys still referenced"
              echo
              echo "Schema keys **removed in this drift** that are still referenced in \`rules/*.json\` or \`bin/ai-config-sync.mjs\`. Likely renamed/deprecated upstream — code may need to switch to the new key or accept both. Top-level + nested (\`definitions.<Type>.properties.<field>\`) paths are both reported."
              if [ -n "${claude_stale:-}" ]; then
                echo
                echo "### Claude"
                printf '%s' "$claude_stale"
              fi
              if [ -n "${claude_nested_stale:-}" ]; then
                if [ -z "${claude_stale:-}" ]; then
                  echo
                  echo "### Claude"
                fi
                printf '%s' "$claude_nested_stale"
              fi
              if [ -n "${codex_stale:-}" ]; then
                echo
                echo "### Codex"
                printf '%s' "$codex_stale"
              fi
              if [ -n "${codex_nested_stale:-}" ]; then
                if [ -z "${codex_stale:-}" ]; then
                  echo
                  echo "### Codex"
                fi
                printf '%s' "$codex_nested_stale"
              fi
            } >> .upstream-compat/body.md
          fi
          # Allowlist re-review triggers: schema description hash drift + recheck_after expiry.
          # description-only hash: opaque changes to default/type don't trigger; semantic prose changes do.
          hash_desc() { printf '%s' "$1" | sha256sum | cut -c1-12; }
          hash_drift_section() {
            local side="$1" file="$2"
            [ -f "$ALLOWLIST" ] || return 0
            [ -f "$file" ] || return 0
            jq -r ".${side}_top_level // {} | to_entries[] | \"\(.key)\t\(.value.schema_desc_hash // \"\")\"" "$ALLOWLIST" \
              | while IFS=$'\t' read -r key recorded; do
                  [ -z "${key:-}" ] && continue
                  desc=$(jq -r ".properties.\"$key\".description // \"\"" "$file" 2>/dev/null)
                  [ -z "$desc" ] && continue
                  current=$(hash_desc "$desc")
                  [ "$current" != "$recorded" ] && printf -- "- %s (%s → %s)\n" "$key" "$recorded" "$current"
                done
          }
          claude_hash_drift=$(hash_drift_section claude snapshots/claude/settings-schema.json || true)
          codex_hash_drift=$(hash_drift_section codex snapshots/codex/config-schema.json || true)
          if [ -n "${claude_hash_drift:-}" ] || [ -n "${codex_hash_drift:-}" ]; then
            {
              echo
              echo "## Compat scan — allowlist entries with schema description drift"
              echo
              echo "Entries in \`rules/upstream-known-unsupported.json\` whose recorded \`schema_desc_hash\` no longer matches the current upstream description. The intent recorded at decision time may no longer apply — re-review the entry, update the hash, or remove it."
              if [ -n "${claude_hash_drift:-}" ]; then
                echo
                echo "### Claude"
                printf '%s\n' "$claude_hash_drift"
              fi
              if [ -n "${codex_hash_drift:-}" ]; then
                echo
                echo "### Codex"
                printf '%s\n' "$codex_hash_drift"
              fi
            } >> .upstream-compat/body.md
          fi
          recheck_due_section() {
            local side="$1"
            [ -f "$ALLOWLIST" ] || return 0
            jq -r --arg today "$today" ".${side}_top_level // {} | to_entries[] | select((.value.recheck_after // \"9999-12-31\") <= \$today) | \"- \(.key) (decided \(.value.decided_at // \"?\"), due \(.value.recheck_after // \"?\"))\"" "$ALLOWLIST" 2>/dev/null
          }
          claude_recheck=$(recheck_due_section claude || true)
          codex_recheck=$(recheck_due_section codex || true)
          if [ -n "${claude_recheck:-}" ] || [ -n "${codex_recheck:-}" ]; then
            {
              echo
              echo "## Compat scan — allowlist entries due for re-review"
              echo
              echo "Entries in \`rules/upstream-known-unsupported.json\` whose \`recheck_after\` date has passed. Re-evaluate whether the original decision still holds, then bump \`recheck_after\` (or remove the entry if a mapping now exists)."
              if [ -n "${claude_recheck:-}" ]; then
                echo
                echo "### Claude"
                printf '%s\n' "$claude_recheck"
              fi
              if [ -n "${codex_recheck:-}" ]; then
                echo
                echo "### Codex"
                printf '%s\n' "$codex_recheck"
              fi
            } >> .upstream-compat/body.md
          fi
          # Enum drift: enum-bearing keys the runtime hardcodes. Members added/removed AND hardcoded values stale.
          extract_enum_members() {
            local file="$1" key="$2"
            [ -f "$file" ] || return 0
            jq -r --arg k "$key" '[.properties[$k].oneOf[]?.enum[]?, .properties[$k].enum[]?] | unique | .[]' "$file" 2>/dev/null | sort -u
          }
          extract_enum_members_head() {
            local path="$1" key="$2"
            git show "HEAD:$path" 2>/dev/null | jq -r --arg k "$key" '[.properties[$k].oneOf[]?.enum[]?, .properties[$k].enum[]?] | unique | .[]' 2>/dev/null | sort -u || true
          }
          # Codex enum-bearing keys + the value the runtime hardcodes.
          codex_enum_watch="snapshots/codex/config-schema.json:sandbox_mode:workspace-write
          snapshots/codex/config-schema.json:approval_policy:on-request
          snapshots/codex/config-schema.json:web_search:live"
          codex_enum_drift=""
          while IFS=: read -r file key val; do
            file=$(echo "$file" | sed 's/^ *//')
            [ -z "${file:-}" ] && continue
            curr=$(extract_enum_members "$file" "$key")
            prev=$(extract_enum_members_head "$file" "$key")
            added=$(comm -23 <(printf '%s\n' "$curr") <(printf '%s\n' "$prev") | sed '/^$/d' | tr '\n' ' ' | sed 's/ *$//' || true)
            removed=$(comm -13 <(printf '%s\n' "$curr") <(printf '%s\n' "$prev") | sed '/^$/d' | tr '\n' ' ' | sed 's/ *$//' || true)
            if [ -n "$added" ] || [ -n "$removed" ]; then
              codex_enum_drift="${codex_enum_drift}- \`${key}\` enum changed"$'\n'
              [ -n "$added" ] && codex_enum_drift="${codex_enum_drift}  - added: ${added}"$'\n'
              [ -n "$removed" ] && codex_enum_drift="${codex_enum_drift}  - removed: ${removed}"$'\n'
            fi
            if [ -n "$curr" ] && ! printf '%s\n' "$curr" | grep -qx "$val"; then
              codex_enum_drift="${codex_enum_drift}- **STALE HARDCODED** \`${key} = \"${val}\"\` no longer in schema enum (runtime will write an invalid value)"$'\n'
            fi
          done <<< "$codex_enum_watch"
          # Claude hardcoded hook event names: properties.hooks.properties.<EventName>
          claude_hook_events_curr=$(jq -r '.properties.hooks.properties // {} | keys[]' snapshots/claude/settings-schema.json 2>/dev/null | sort -u)
          claude_hook_events_prev=$(git show HEAD:snapshots/claude/settings-schema.json 2>/dev/null | jq -r '.properties.hooks.properties // {} | keys[]' 2>/dev/null | sort -u || true)
          claude_hook_added=$(comm -23 <(printf '%s\n' "$claude_hook_events_curr") <(printf '%s\n' "$claude_hook_events_prev") | sed '/^$/d' | tr '\n' ' ' | sed 's/ *$//' || true)
          claude_hook_removed=$(comm -13 <(printf '%s\n' "$claude_hook_events_curr") <(printf '%s\n' "$claude_hook_events_prev") | sed '/^$/d' | tr '\n' ' ' | sed 's/ *$//' || true)
          claude_enum_drift=""
          if [ -n "$claude_hook_added" ] || [ -n "$claude_hook_removed" ]; then
            claude_enum_drift="${claude_enum_drift}- \`hooks\` event names changed"$'\n'
            [ -n "$claude_hook_added" ] && claude_enum_drift="${claude_enum_drift}  - added: ${claude_hook_added}"$'\n'
            [ -n "$claude_hook_removed" ] && claude_enum_drift="${claude_enum_drift}  - removed: ${claude_hook_removed}"$'\n'
          fi
          for ev in PreToolUse PostToolUse SessionStart UserPromptSubmit; do
            if [ -n "$claude_hook_events_curr" ] && ! printf '%s\n' "$claude_hook_events_curr" | grep -qx "$ev"; then
              claude_enum_drift="${claude_enum_drift}- **STALE HARDCODED** hook event \`${ev}\` no longer in \`hooks.properties\` (runtime writes a hook the host will not fire)"$'\n'
            fi
          done
          if [ -n "${claude_enum_drift:-}" ] || [ -n "${codex_enum_drift:-}" ]; then
            {
              echo
              echo "## Compat scan — enum drift on watched keys"
              echo
              echo "Enum members on keys the runtime hardcodes. STALE HARDCODED means \`bin/ai-config-sync.mjs\` will emit a value the new schema rejects — runtime fix required, not just a checklist."
              if [ -n "${claude_enum_drift:-}" ]; then
                echo
                echo "### Claude"
                printf '%s\n' "$claude_enum_drift"
              fi
              if [ -n "${codex_enum_drift:-}" ]; then
                echo
                echo "### Codex"
                printf '%s\n' "$codex_enum_drift"
              fi
            } >> .upstream-compat/body.md
          fi

      - name: Open drift PR
        if: steps.drift.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          branch: upstream-compat/refresh
          base: main
          title: ${{ steps.body.outputs.title }}
          body-path: .upstream-compat/body.md
          commit-message: "chore(snapshots): refresh upstream snapshots"
          labels: compatibility
          add-paths: snapshots
