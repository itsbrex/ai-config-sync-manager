name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  manual-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Reset manual test lab from templates
        run: npm run test:manual:reset

      - name: Run manual integration cases
        run: npm run test:manual:run
