name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  manual-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code and Codex CLIs
        run: npm install -g @anthropic-ai/claude-code @openai/codex

      - name: Reset manual test lab from templates
        run: npm run test:manual:reset

      - name: Run manual integration cases
        run: npm run test:manual:run

      - name: Upload manual integration logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: manual-integration-logs
          path: /tmp/manual-cases-out
          retention-days: 7
