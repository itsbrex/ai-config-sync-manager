[mcp_servers.all-agents-mcp]
command = "npx"
args = ["-y", "all-agents-mcp"]
env = { AA_MCP_LOG_LEVEL = "warn", AA_MCP_CODEX_ANALYSIS_LEVEL = "medium" }

[mcp_servers.all-agents-mcp.tools.ask_agent]
approval_mode = "approve"

[mcp_servers.all-agents-mcp.tools.delegate_task]
approval_mode = "prompt"
