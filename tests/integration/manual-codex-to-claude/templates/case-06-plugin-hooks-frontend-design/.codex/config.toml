sandbox_mode = "workspace-write"

[[hooks.PreToolUse]]
matcher = "Write|Edit|MultiEdit"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "node scripts/check-ui-scope.mjs"

[[hooks.PostToolUse]]
matcher = "Write|Edit|MultiEdit"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "npm run format"
